<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="fonts.css" />
<link rel="stylesheet" href="stage.css?v=9" />
<style>
  /* Body fits the stage's actual size (the stage sets its own width/height per ratio),
     so tall ratios like 9:16 don't leave empty space below a fixed 1350px body. */
  html, body { margin: 0; padding: 0; background: #101138; }
  body { width: 1080px; overflow: hidden; }
</style>
</head>
<body class="stage-scope">
  <div class="stage" id="stage" data-type="cover" data-theme="dark"></div>
  <script src="textures.js?v=9"></script>
  <script src="stage.js?v=9"></script>
  <script>
    var __last = null;
    function paint(d) { __last = d; window.renderStage(document.getElementById("stage"), d); }
    if (window.__SLIDE_DATA__) paint(window.__SLIDE_DATA__);
    window.addEventListener("message", function (e) {
      if (e.data && e.data.type === "render") paint(e.data.data);
    });
    // Re-fit once real fonts finish loading so the preview matches the export.
    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(function () { if (__last) window.refitStage(document.getElementById("stage")); });
    }
  </script>
</body>
</html>
